steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speakright-api:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speakright-api:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/speakright-api:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/speakright-api:latest'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'speakright-api'
      - '--image=gcr.io/$PROJECT_ID/speakright-api:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--cpu-throttling'
      - '--set-env-vars=AWS_DEFAULT_REGION=ap-south-1,S3_BUCKET_NAME=speach-analyzer,ALLOWED_ORIGINS=$_ALLOWED_ORIGINS'
      - '--set-secrets=AWS_ACCESS_KEY_ID=aws-access-key:latest,AWS_SECRET_ACCESS_KEY=aws-secret-key:latest,GEMINI_API_KEY=gemini-api-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_ANON_KEY=supabase-anon-key:latest,SUPABASE_JWT_SECRET=supabase-jwt-secret:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,DATABASE_URL=database-url:latest'

images:
  - 'gcr.io/$PROJECT_ID/speakright-api:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/speakright-api:latest'

substitutions:
  _REGION: 'us-central1'
  _ALLOWED_ORIGINS: '*'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
