steps:
  # Build the container image with build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '--build-arg'
      - 'REACT_APP_API_URL=$_API_URL'
      - '--build-arg'
      - 'REACT_APP_SUPABASE_URL=$_SUPABASE_URL'
      - '--build-arg'
      - 'REACT_APP_SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speakright-frontend:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speakright-frontend:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/speakright-frontend:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/speakright-frontend:latest'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'speakright-frontend'
      - '--image=gcr.io/$PROJECT_ID/speakright-frontend:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/speakright-frontend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/speakright-frontend:latest'

substitutions:
  _REGION: 'us-central1'
  _API_URL: 'https://speakright-api-XXXXXXXXXX-uc.a.run.app'
  _SUPABASE_URL: ''
  _SUPABASE_ANON_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
